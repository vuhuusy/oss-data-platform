apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: compute
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark
  namespace: compute
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark
  namespace: compute
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: compute
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark
