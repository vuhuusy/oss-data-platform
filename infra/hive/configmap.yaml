apiVersion: v1
kind: ConfigMap
metadata:
  name: metastore-cfg
  namespace: metastore
data:
  metastore-site.xml: |
    <configuration>
     <property>
      <name>javax.jdo.option.ConnectionDriverName</name>
      <value>org.postgresql.Driver</value>
     </property>
     <property>
      <name>javax.jdo.option.ConnectionURL</name>
      <value>jdbc:postgresql://hms-postgresql.metastore.svc.cluster.local:5432/metastore</value>
     </property>
     <property>
      <name>javax.jdo.option.ConnectionUserName</name>
      <value>hive</value>
     </property>
     <property>
      <name>javax.jdo.option.ConnectionPassword</name>
      <value>hive</value>
     </property>
     <property>
      <name>metastore.warehouse.dir</name>
      <value>s3a://metastore/data/</value>
     </property>
     <property>
      <name>metastore.thrift.port</name>
      <value>9083</value>
     </property>
    </configuration>
  core-site.xml: |
    <configuration>
        <property>
            <name>fs.s3a.connection.ssl.enabled</name>
         <value>false</value>
        </property>
        <property>
         <name>fs.s3a.path.style.access</name>
         <value>true</value>
        </property>
        <property>
         <name>fs.s3a.endpoint</name>
         <value>http://minio.storage.svc.cluster.local:9000</value>
        </property>
        <property>
         <name>fs.s3a.fast.upload</name>
         <value>true</value>
        </property>
        <property>
              <name>fs.s3a.access.key</name>
              <value>minioadmin</value>
        </property>
        <property>
            <name>fs.s3a.secret.key</name>
            <value>minioadmin</value>
        </property>
    </configuration>
