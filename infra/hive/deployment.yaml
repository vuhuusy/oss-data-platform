apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
spec:
  selector:
    matchLabels:
      app: hive-metastore
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
        - name: hive-metastore
          image: hive-metastore:3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9083
          env:
            - name: CORE_SITE
              value: /opt/hadoop/etc/hadoop/core-site.xml
            - name: METASTORE_SITE
              value: /opt/hive-metastore/conf/metastore-site.xml
          command: ["/opt/entrypoint.sh"]